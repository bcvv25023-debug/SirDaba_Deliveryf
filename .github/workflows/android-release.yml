name: SirDaba

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip project
        run: unzip SirDabaDelivery_NativeApp_Complete.zip

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Build Debug APK
        working-directory: SirDabaApp
        run: gradle assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: SirDaba-debug-apk
          path: SirDabaApp/app/build/outputs/apk/debug/*.apk
          retention-days: 7
